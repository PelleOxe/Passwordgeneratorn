<style>
:root{
  --bg:#0f1720; --bg2:#16212c; --panel:#1b2836; --line:#2a3a49;
  --text:#e7eef2; --muted:#8fa4b3; --accent:#52e3c2; --accent2:#7c9eff;
  --warn:#ffb020; --danger:#ff6b6b; --good:#52e3c2;
  --radius:14px; --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
[data-theme="light"]{
  --bg:#f3f6f8; --bg2:#ffffff; --panel:#ffffff; --line:#dbe4ea;
  --text:#101820; --muted:#5c7382; --accent:#0f9d81; --accent2:#3f63c9;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);
  font-family:var(--sans);min-height:100vh;padding:20px 14px 40px;transition:background .3s,color .3s}
.wrap{max-width:560px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:30px;height:30px;flex:none}
.brand h1{font-size:17px;margin:0;letter-spacing:.2px}
.brand span{display:block;font-size:11px;color:var(--muted);font-weight:400}
.iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--text);
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn svg{width:18px;height:18px}
.controls{display:flex;gap:8px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:14px}

.tabs{display:flex;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:4px;margin-bottom:16px}
.tabbtn{flex:1;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;
  padding:9px 6px;border-radius:8px;cursor:pointer}
.tabbtn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.15)}

.testhint{display:none;font-size:12px;color:var(--muted);margin:-6px 0 12px}
body.mode-test .testhint{display:block}
body.mode-test #genControls{display:none}

.pwdisplay{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:14px;margin-bottom:12px}
#pw{font-family:var(--mono);font-size:clamp(15px,4.4vw,20px);word-break:break-all;flex:1;line-height:1.4;
  min-height:1.4em}
.pwfield{background:none;border:none;color:var(--text);outline:none;width:100%;padding:0}
.pwfield::placeholder{color:var(--muted)}
.pwfield:read-only{cursor:default}
.copybtn{flex:none;background:var(--accent);color:#06231c;border:none;border-radius:8px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.copybtn svg{width:19px;height:19px}
.copybtn.copied{background:var(--good)}

.strength{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:var(--muted)}
.strength .bars{display:flex;gap:3px;flex:1}
.strength .bar{height:5px;flex:1;border-radius:3px;background:var(--line)}
.strength .bar.on1{background:var(--danger)}
.strength .bar.on2{background:var(--warn)}
.strength .bar.on3{background:var(--accent2)}
.strength .bar.on4{background:var(--good)}

.row{display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px}
.row label{font-size:13px;color:var(--muted)}
.lenval{font-family:var(--mono);font-size:15px;color:var(--text);font-weight:600}
input[type=range]{width:100%;accent-color:var(--accent)}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.opt{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;cursor:pointer;user-select:none}
.opt input{width:17px;height:17px;accent-color:var(--accent)}
.opt span{font-size:13.5px}
.opt.disabled{opacity:.45;cursor:not-allowed}

details{margin-top:12px}
summary{cursor:pointer;font-size:12.5px;color:var(--muted);padding:4px 0}
.advrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
.advrow input[type=text]{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:13px}

.genbtn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06231c;
  border:none;border-radius:12px;padding:15px;font-size:15.5px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.genbtn svg{width:18px;height:18px}
.genbtn:active{transform:scale(.98)}

.histrow{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--muted)}
.histrow button{background:none;border:none;color:var(--accent2);font-size:12.5px;cursor:pointer;padding:0}

.statbox{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;margin-top:12px}
.statbox .big{font-family:var(--mono);font-size:17px;color:var(--accent);font-weight:700}
.statbox .sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:1px solid var(--line);color:var(--text);padding:10px 18px;border-radius:10px;
  font-size:13px;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}
.modal.show{display:flex}
.modalcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;max-width:300px}
.modalcard img{background:#fff;padding:10px;border-radius:10px;width:180px;height:180px}
.modalcard p{font-size:12.5px;color:var(--muted);word-break:break-all;margin:12px 0 4px}
.modalcard button{margin-top:14px;background:var(--bg);border:1px solid var(--line);color:var(--text);
  padding:8px 16px;border-radius:8px;cursor:pointer}

footer{text-align:center;font-size:11.5px;color:var(--muted);margin-top:28px}
</style>
</head>

async function hashPw(pw){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));

}

// ---------- Säker slumpgenerering ----------
function secureIndex(max){
  const arr = new Uint32Array(1);
  const limit = Math.floor(0xFFFFFFFF / max) * max;
  let r;
  do{ crypto.getRandomValues(arr); r = arr[0]; } while(r >= limit);
  return r % max;
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = secureIndex(i+1);
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

const SETS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ',
  lower: 'abcdefghijklmnopqrstuvwxyzåäö',
  digits: '0123456789',
  special: '!@#$%^&*()_+-=[]{};:,.<>/?~'
};
const AMBIGUOUS = '0O1lI|';

function buildPassword(){
  const len = parseInt(lenInput.value,10);
  const useUpper = document.getElementById('upper').checked;
  const useLower = document.getElementById('lower').checked;
  const useDigits = document.getElementById('digits').checked;
  const useSpecial = document.getElementById('special').checked;
  const skipAmbig = document.getElementById('ambiguous').checked;
  const customExclude = document.getElementById('exclude').value.split('');

  const groups = [];
  if(useUpper) groups.push(SETS.upper);
  if(useLower) groups.push(SETS.lower);
  if(useDigits) groups.push(SETS.digits);
  if(useSpecial) groups.push(SETS.special);

  const clean = s => s.split('').filter(c =>
    !(skipAmbig && AMBIGUOUS.includes(c)) && !customExclude.includes(c)
  ).join('');

  const cleanGroups = groups.map(clean).filter(g => g.length > 0);
  if(cleanGroups.length === 0) return null;

  const fullSet = cleanGroups.join('');
  const chars = [];
  // Garantera minst ett tecken från varje vald kategori
  cleanGroups.forEach(g => chars.push(g[secureIndex(g.length)]));
  while(chars.length < len){
    chars.push(fullSet[secureIndex(fullSet.length)]);
  }
  return shuffle(chars).slice(0,len).join('');
}

function strengthScore(len, poolSize){
  const bits = len * Math.log2(Math.max(poolSize,2));
  if(bits < 40) return 1;
  if(bits < 60) return 2;
  if(bits < 90) return 3;
  return 4;
}
function updateStrengthUI(score, labelOverride){
  const labels = {1:'Svag',2:'Okej',3:'Stark',4:'Mycket stark'};
  document.getElementById('strengthLabel').textContent = labelOverride || labels[score] || 'Styrka';
  for(let i=1;i<=4;i++){
    const bar = document.getElementById('b'+i);
    bar.className = 'bar' + (i<=score ? ' on'+score : '');
  }
}

// ---------- Antal möjliga lösenord (kul-räknare) ----------
function formatDuration(seconds){
  if(seconds < 0.001) return 'under en millisekund';
  if(seconds < 1) return Math.round(seconds*1000) + ' millisekunder';
  if(seconds < 60) return (seconds < 10 ? seconds.toFixed(2) : Math.round(seconds)) + ' sekunder';
  if(seconds < 3600) return (seconds/60).toFixed(1) + ' minuter';
  if(seconds < 86400) return (seconds/3600).toFixed(1) + ' timmar';
  if(seconds < 31536000) return (seconds/86400).toFixed(1) + ' dagar';
  return (seconds/31536000).toFixed(1) + ' år';
}
function sciFromNumber(num){
  if(!isFinite(num) || num <= 0) return '0';
  const exp = Math.floor(Math.log10(num));
  const mantissa = num / Math.pow(10, exp);
  return mantissa.toFixed(2).replace('.',',') + ' × 10^' + exp;
}
function formatDuration(seconds){
  if(seconds < 0.001) return 'under en millisekund';
  if(seconds < 1) return Math.round(seconds*1000) + ' millisekunder';
  if(seconds < 60) return (seconds < 10 ? seconds.toFixed(2) : Math.round(seconds)) + ' sekunder';
  if(seconds < 3600) return (seconds/60).toFixed(1) + ' minuter';
  if(seconds < 86400) return (seconds/3600).toFixed(1) + ' timmar';
  if(seconds < 31536000) return (seconds/86400).toFixed(1) + ' dagar';
  const years = seconds/31536000;
  if(years < 1000) return years.toFixed(1) + ' år';
  if(years < 1000000) return Math.round(years).toLocaleString('sv-SE') + ' år';
  return sciFromNumber(years) + ' år (' + Math.round(years).toLocaleString('sv-SE') + ' år)';
}
function formatBig(n){
  if(n <= 0n) return '0';
  const s = n.toString();
  const exp = s.length - 1;
  const mantissa = s[0] + '.' + (s.slice(1,3).padEnd(2,'0'));
  return exp === 0 ? s : `${mantissa} × 10^${exp}`;
}
const COMPARE_TABLE = [
  [0,  'färre än det finns människor på jorden (≈8 × 10⁹)'],
  [10, 'fler än jordens befolkning'],
  [12, 'fler än stjärnorna i Vintergatan (≈2–4 × 10¹¹)'],
  [18, 'fler än sandkornen på jordens alla stränder (≈7,5 × 10¹⁸)'],
  [24, 'fler än de uppskattade stjärnorna i hela det observerbara universum (≈10²⁴)'],
  [50, 'långt bortom antalet stjärnor i universum – rena astronomin'],
  [80, 'i klass med antalet atomer i det observerbara universum (≈10⁸⁰)']
];
function compareText(exp){
  let text = COMPARE_TABLE[0][1];
  for(const [minExp, t] of COMPARE_TABLE){ if(exp >= minExp) text = t; }
  return text;
}
function renderCombosAndCrack(total){
  document.getElementById('statCombos').textContent = 'Möjliga kombinationer: ' + formatBig(total);
  const exp = total.toString().length - 1;
  document.getElementById('statCompare').textContent = 'Det är ' + compareText(exp) + '.';

  // Grov brute-force-uppskattning: 10 miljarder gissningar/sekund.
  // Number(total) räcker gott – även extremt stora tal ryms utan problem
  // i ett vanligt flyttal för en ungefärlig uppskattning.
  const GUESSES_PER_SEC = 1e10;
  const totalNum = Number(total);
  const seconds = totalNum / GUESSES_PER_SEC;
  const years = seconds / 31536000;
  const universeAgeYears = 13800000000;

  let crackText = 'Brute-force i ≈10 miljarder försök/sek: ' + formatDuration(seconds) + '.';
  if(years > universeAgeYears){
    const ratio = years / universeAgeYears;
    const ratioText = ratio > 1000
      ? sciFromNumber(ratio) + ' (' + Math.round(ratio).toLocaleString('sv-SE') + ')'
      : Math.round(ratio).toLocaleString('sv-SE');
    crackText += ' Det är ' + ratioText + ' gånger universums ålder.';
  }
  return crackText;
}

function computeStats(){
  const len = parseInt(lenInput.value,10);
  const skipAmbig = document.getElementById('ambiguous').checked;
  const customExclude = document.getElementById('exclude').value.split('');
  const clean = s => s.split('').filter(c =>
    !(skipAmbig && AMBIGUOUS.includes(c)) && !customExclude.includes(c)
  ).join('');

  const cats = [];
  if(document.getElementById('upper').checked) cats.push(clean(SETS.upper).length);
  if(document.getElementById('lower').checked) cats.push(clean(SETS.lower).length);
  if(document.getElementById('digits').checked) cats.push(clean(SETS.digits).length);
  if(document.getElementById('special').checked) cats.push(clean(SETS.special).length);

  if(cats.length === 0 || cats.some(s=>s===0)){
    document.getElementById('statCombos').textContent = '–';
    document.getElementById('statCompare').textContent = 'Kryssa i minst ett teckenval för att se antalet kombinationer.';
    document.getElementById('statCrack').textContent = '';
    updateStrengthUI(0);
    return;
  }

  const N = cats.reduce((a,b)=>a+b,0);
  const m = cats.length;
  const L = BigInt(len);

  updateStrengthUI(strengthScore(len, N));

  // Inclusion-exclusion: räknar bara kombinationer som innehåller minst
  // ett tecken från VARJE vald kategori (samma krav som generatorn använder).
  let total = 0n;
  for(let mask=0; mask < (1<<m); mask++){
    let missing = 0, bits = 0;
    for(let i=0;i<m;i++){ if(mask & (1<<i)){ missing += cats[i]; bits++; } }
    const poolLeft = BigInt(N - missing);
    const term = poolLeft ** L;
    total += (bits % 2 === 0) ? term : -term;
  }

  document.getElementById('statCrack').textContent = renderCombosAndCrack(total);
}
['input','change'].forEach(evt=>{
  [lenInput, ...boxes, document.getElementById('ambiguous'), document.getElementById('exclude')]
    .forEach(el => el.addEventListener(evt, computeStats));
});

// ---------- Testa ett befintligt lösenord ----------
const COMMON_PASSWORDS = new Set([
  '123456','123456789','12345678','12345','1234567','1234567890','qwerty','qwerty123',
  'password','password1','p@ssw0rd','iloveyou','111111','000000','123123','admin',
  'letmein','welcome','monkey','dragon','football','baseball','master','login',
  'princess','solo','starwars','trustno1','sunshine','superman','abc123','asdasd',
  'hunter2','changeme','lösenord','lösen123','qwerty1'
]);
function detectPoolSize(pw){
  let n = 0;
  if(/[a-zåäö]/.test(pw)) n += 29;
  if(/[A-ZÅÄÖ]/.test(pw)) n += 29;
  if(/[0-9]/.test(pw)) n += 10;
  if(/[^a-zA-ZÅÄÖåäö0-9]/.test(pw)) n += 33;
  return n;
}
function computeStatsForInput(pw){
  if(!pw){
    document.getElementById('statCombos').textContent = '–';
    document.getElementById('statCompare').textContent = 'Väntar på ett lösenord att testa.';
    document.getElementById('statCrack').textContent = '';
    updateStrengthUI(0);
    return;
  }
  const N = detectPoolSize(pw);
  const len = pw.length;
  const total = N > 0 ? BigInt(N) ** BigInt(len) : 0n;

  const isCommon = COMMON_PASSWORDS.has(pw.toLowerCase());
  updateStrengthUI(isCommon ? 1 : strengthScore(len, N), isCommon ? 'Mycket svag (känt lösenord)' : null);

  let crackText = renderCombosAndCrack(total);
  if(isCommon){
    crackText = '⚠️ Det här är ett av världens mest kända lösenord – finns i praktiskt taget varje läckt lösenordslista och gissas på under en sekund, oavsett vad uträkningen ovan säger.';
  }
  document.getElementById('statCrack').textContent = crackText;
}

async function generate(){
  const len = parseInt(lenInput.value,10);
  const history = getHistory();
  let pw, hash, tries = 0;
  do{
    pw = buildPassword();
    if(pw === null){ toast('Kryssa i minst ett teckenval'); return; }
    hash = await hashPw(pw);
    tries++;
  } while(history.includes(hash) && tries < 50);

  pwInput.value = pw;
  pwInput.dataset.hash = hash;
  lastGeneratedPw = pw;

  copyBtn.classList.remove('copied');
  computeStats();
}
document.getElementById('genBtn').onclick = generate;

// ---------- Kopiera (genereringsläge) / Klistra in (testläge) ----------
async function doCopy(){
  const pw = pwInput.value;
  const hash = pwInput.dataset.hash;
  if(!pw){ toast('Generera ett lösenord först'); return; }
  try{
    await navigator.clipboard.writeText(pw);
  }catch(e){
    const ta = document.createElement('textarea');
    ta.value = pw; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
  const history = getHistory();
  if(hash && !history.includes(hash)){
    history.push(hash);
    saveHistory(history);
    updateHistCount();
  }
  copyBtn.classList.add('copied');
  toast('Kopierat! Lösenordet genereras aldrig igen.');
}

async function doPaste(){
  try{
    const text = await navigator.clipboard.readText();
    pwInput.value = text;
    computeStatsForInput(text);
    pwInput.focus();
  }catch(e){
    toast('Kunde inte läsa urklipp – klistra in manuellt (Ctrl/Cmd+V) i fältet istället.');
    pwInput.focus();
  }
}

copyBtn.onclick = () => { mode === 'generate' ? doCopy() : doPaste(); };

// ---------- Service worker (offline) ----------
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'pwapp-v1-03';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => cached))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
